name: Build and Push

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: vollminlab
    steps:
      - uses: actions/checkout@v4

      - name: Set up kaniko
        run: |
          # crane is a standalone OCI tool — no Docker daemon required.
          # We use it to export the kaniko executor image and extract the binary.
          curl -fsSL https://github.com/google/go-containerregistry/releases/download/v0.20.2/go-containerregistry_Linux_x86_64.tar.gz \
            | tar -xz -C /tmp crane
          /tmp/crane export gcr.io/kaniko-project/executor:v1.23.2 /tmp/kaniko-image.tar
          tar -xf /tmp/kaniko-image.tar -C / kaniko
          chmod +x /kaniko/executor
          rm /tmp/kaniko-image.tar

      - name: Configure Harbor credentials
        run: |
          mkdir -p /kaniko/.docker
          printf '{"auths":{"harbor.vollminlab.com":{"auth":"%s"}}}' \
            "$(printf '%s:%s' '${{ secrets.HARBOR_USERNAME }}' '${{ secrets.HARBOR_PASSWORD }}' | base64 -w0)" \
            > /kaniko/.docker/config.json

      - name: Build and push with kaniko
        run: |
          /kaniko/executor \
            --context=dir://${{ github.workspace }} \
            --dockerfile=${{ github.workspace }}/Dockerfile \
            --destination=harbor.vollminlab.com/vollminlab/shlink-ingress-controller:${{ github.ref_name }}

  publish-chart:
    runs-on: vollminlab
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to Harbor OCI registry
        run: |
          helm registry login harbor.vollminlab.com \
            --username ${{ secrets.HARBOR_USERNAME }} \
            --password ${{ secrets.HARBOR_PASSWORD }}

      - name: Package and push chart
        run: |
          VERSION="${{ github.ref_name }}"
          SEMVER="${VERSION#v}"
          helm package charts/shlink-ingress-controller \
            --version "${SEMVER}" \
            --app-version "${SEMVER}"
          helm push "shlink-ingress-controller-${SEMVER}.tgz" \
            oci://harbor.vollminlab.com/vollminlab
