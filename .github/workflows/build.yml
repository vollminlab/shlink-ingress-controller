name: Build and Push

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: vollminlab
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Harbor
        uses: docker/login-action@v4
        with:
          registry: harbor.vollminlab.com
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Compute semver tag
        run: |
          REF="${{ github.ref_name }}"
          echo "SEMVER=${REF#v}" >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            harbor.vollminlab.com/vollminlab/shlink-ingress-controller:${{ github.ref_name }}
            harbor.vollminlab.com/vollminlab/shlink-ingress-controller:${{ env.SEMVER }}

  publish-chart:
    runs-on: vollminlab
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Log in to Harbor OCI registry
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          echo "$HARBOR_PASSWORD" | helm registry login harbor.vollminlab.com \
            --username "$HARBOR_USERNAME" \
            --password-stdin

      - name: Package and push chart
        run: |
          VERSION="${{ github.ref_name }}"
          SEMVER="${VERSION#v}"
          helm package charts/shlink-ingress-controller \
            --version "${SEMVER}" \
            --app-version "${SEMVER}"
          helm push "shlink-ingress-controller-${SEMVER}.tgz" \
            oci://harbor.vollminlab.com/vollminlab/charts
