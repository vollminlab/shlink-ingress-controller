name: Build and Push

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: vollminlab
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.vollminlab.com
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: harbor.vollminlab.com/vollminlab/shlink-ingress-controller:${{ github.ref_name }}

  publish-chart:
    runs-on: vollminlab
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to Harbor OCI registry
        run: |
          helm registry login harbor.vollminlab.com \
            --username ${{ secrets.HARBOR_USERNAME }} \
            --password ${{ secrets.HARBOR_PASSWORD }}

      - name: Package and push chart
        run: |
          VERSION="${{ github.ref_name }}"
          SEMVER="${VERSION#v}"
          helm package charts/shlink-ingress-controller \
            --version "${SEMVER}" \
            --app-version "${SEMVER}"
          helm push "shlink-ingress-controller-${SEMVER}.tgz" \
            oci://harbor.vollminlab.com/vollminlab
