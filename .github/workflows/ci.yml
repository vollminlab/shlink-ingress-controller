name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: vollminlab
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test ./...

      - name: Install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
        env:
          GOTOOLCHAIN: auto

      - name: Run integration tests
        run: |
          KUBEBUILDER_ASSETS=$(setup-envtest use 1.32 --bin-dir /tmp/envtest-bins -p path)
          go test -tags integration -timeout 120s ./internal/controller/
        env:
          GOTOOLCHAIN: auto
