name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: vollminlab
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test ./...

      - name: Install setup-envtest
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
        env:
          GOTOOLCHAIN: auto

      - name: Download envtest binaries
        run: echo "KUBEBUILDER_ASSETS=$(setup-envtest use 1.32 --bin-dir /tmp/envtest-bins -p path)" >> $GITHUB_ENV

      - name: Run integration tests
        run: go test -tags integration -timeout 120s ./internal/controller/
