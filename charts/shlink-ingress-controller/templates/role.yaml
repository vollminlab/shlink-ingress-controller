apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "shlink-ingress-controller.fullname" . }}
  namespace: {{ .Values.shlink.secretNamespace }}
  labels:
    {{- include "shlink-ingress-controller.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
